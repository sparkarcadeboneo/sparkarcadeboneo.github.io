<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPARK Arcade &mdash; Cartridge Library</title>
<style>
  /* ============ TOKENS ============ */
  :root{
    --bg:#0b0f14;
    --panel:#131a22;
    --line:#22303e;
    --ink:#e8eef4;
    --dim:#7b8a99;
    --volt:#ffd60a;   /* spark yellow */
    --arc:#4dc3ff;    /* arc blue */
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"Cascadia Mono","Menlo","Consolas",monospace;
    min-height:100vh;display:flex;flex-direction:column;
  }

  /* ============ HEADER ============ */
  header{
    position:sticky;top:0;z-index:10;
    background:rgba(11,15,20,.94);backdrop-filter:blur(4px);
    border-bottom:1px solid var(--line);
    padding:14px 20px 12px;
  }
  .head-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px;max-width:1280px;margin:0 auto}
  h1{
    margin:0;font-size:20px;letter-spacing:4px;font-weight:800;
    color:var(--volt);white-space:nowrap;
  }
  h1 .zap{color:var(--arc)}
  .subtag{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;white-space:nowrap}
  .spacer{flex:1}
  .search{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    color:var(--ink);font:inherit;font-size:14px;
    padding:8px 12px;min-width:220px;flex:0 1 320px;
  }
  .search::placeholder{color:var(--dim)}
  .search:focus{outline:none;border-color:var(--arc);box-shadow:0 0 10px rgba(77,195,255,.25)}
  .sort-btn{
    background:var(--panel);border:1px solid var(--line);border-radius:6px;
    color:var(--ink);font:inherit;font-size:12px;letter-spacing:1px;
    padding:8px 12px;cursor:pointer;white-space:nowrap;
  }
  .sort-btn:hover{border-color:var(--arc)}
  .count{font-size:12px;color:var(--dim);white-space:nowrap}

  /* ============ STATUS ============ */
  .msg{max-width:1280px;margin:10px auto 0;padding:0 20px;font-size:13px;color:var(--dim)}
  .msg.err{color:#ff7a7a}
  .msg:empty{display:none}

  /* ============ SHELF ============ */
  main{flex:1;width:100%;max-width:1280px;margin:0 auto;padding:18px 20px 40px}
  #shelf{
    display:grid;gap:18px;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  }

  /* ============ CARTRIDGE ============ */
  .cart{
    --shell:#4dc3ff;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px 10px 6px 6px;
    padding:0 0 10px;
    position:relative;
    overflow:hidden;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .cart:hover,.cart:focus-within{
    transform:translateY(-3px);
    border-color:var(--shell);
    box-shadow:0 6px 18px rgba(0,0,0,.5);
  }
  /* top grip ridges, like the finger grooves on a real cartridge */
  .cart .grip{
    height:22px;
    background:
      repeating-linear-gradient(90deg,
        rgba(255,255,255,.14) 0 6px,
        rgba(0,0,0,0) 6px 14px),
      var(--shell);
    border-bottom:3px solid rgba(0,0,0,.35);
  }
  /* the notched corner every cart has */
  .cart::after{
    content:"";position:absolute;top:0;right:0;
    border-style:solid;border-width:0 18px 18px 0;
    border-color:transparent var(--bg) transparent transparent;
  }
  /* label sticker */
  .cart .sticker{
    margin:10px 12px 8px;
    background:#0d1218;
    border:1px solid var(--line);
    border-left:4px solid var(--shell);
    border-radius:4px;
    padding:9px 10px 8px;
    min-height:74px;
  }
  .cart .gname{
    font-size:15px;font-weight:800;line-height:1.25;
    color:var(--shell);
    overflow-wrap:anywhere;
  }
  .cart .who{margin-top:4px;font-size:12px;color:var(--dim)}
  /* actions */
  .cart .actions{display:flex;align-items:center;gap:8px;padding:0 12px}
  .remix-btn{
    font:inherit;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    background:transparent;border:1px solid var(--volt);border-radius:4px;
    color:var(--volt);padding:5px 10px;cursor:pointer;
    transition:background .15s,color .15s;
    white-space:nowrap;
  }
  .remix-btn:hover{background:var(--volt);color:#0b0f14}
  .remix-btn:focus-visible,.play-link:focus-visible,.search:focus-visible,.sort-btn:focus-visible{
    outline:2px solid var(--arc);outline-offset:2px;
  }
  .play-link{
    font-size:11px;color:var(--arc);text-decoration:none;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    flex:1;min-width:0;
  }
  .play-link:hover{text-decoration:underline}

  /* ============ EMPTY / ERROR ============ */
  .empty{display:none;text-align:center;padding:60px 20px;color:var(--dim)}
  .empty .big{font-size:18px;color:var(--ink);letter-spacing:2px;margin-bottom:8px}

  footer{
    border-top:1px solid var(--line);
    padding:12px 20px;text-align:center;
    font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;
  }

  @media (prefers-reduced-motion:reduce){
    .cart,.remix-btn{transition:none}
    .cart:hover,.cart:focus-within{transform:none}
  }
  @media (max-width:520px){
    #shelf{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
    .search{min-width:0;flex:1 1 100%}
  }
</style>
</head>
<body>

<header>
  <div class="head-row">
    <h1><span class="zap">&#9889;</span> SPARK ARCADE</h1>
    <span class="subtag">Cartridge library</span>
    <span class="spacer"></span>
    <input class="search" id="searchBox" type="search" placeholder="Search games, names, grades&#8230;" autocomplete="off" spellcheck="false" aria-label="Search games">
    <button class="sort-btn" id="sortBtn" title="Flip between newest-first and oldest-first">Sort: Newest</button>
    <span class="count" id="count"></span>
  </div>
</header>
<div class="msg" id="loadMsg">Loading games&hellip;</div>

<main>
  <div id="shelf"></div>
  <div class="empty" id="emptyState">
    <div class="big" id="emptyTitle">No games yet</div>
    <p id="emptyText">Games added to the spreadsheet appear here automatically.</p>
  </div>
</main>

<footer>SPARK Centre &bull; Boneo Primary School &bull; Free Play</footer>

<script>
(function(){
  "use strict";

  /* ---------- data source: published Google Sheet as CSV (no libraries needed) ---------- */
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQYOnFCDtaPGF_q7MDIkaXa8Bu8hjXR1rIMR1oZfND8uf8Z8An-VdEXty5WZL8OF7f3VHzLEYG4noED/pub?output=csv";
  const REFRESH_MS = 3 * 60 * 1000;   // re-check the sheet every 3 minutes

  let games = [];
  let query = "";
  let sortOrder = "newest";   // sheet rows are oldest-first

  const shelf = document.getElementById("shelf");
  const loadMsg = document.getElementById("loadMsg");
  const countEl = document.getElementById("count");
  const searchBox = document.getElementById("searchBox");
  const sortBtn = document.getElementById("sortBtn");
  const emptyState = document.getElementById("emptyState");
  const emptyTitle = document.getElementById("emptyTitle");
  const emptyText = document.getElementById("emptyText");

  /* ---------- makecode share ids ----------
     Two formats are in the wild:
       _LmgRUJatoKwY                  (lettered id -> makecode.com/_ID)
       50734-57996-78092-48491       (numbered id -> arcade.makecode.com/ID)
     Both open in the editor via arcade.makecode.com/#pub:ID.            */
  function extractId(input){
    input = String(input||"").trim();
    let m = input.match(/_[A-Za-z0-9]{8,}/);
    if (m) return m[0];
    m = input.match(/\d{4,6}(?:-\d{4,6}){2,}/);
    return m ? m[0] : null;
  }
  const playUrl = id => id.charAt(0) === "_"
    ? "https://makecode.com/" + id
    : "https://arcade.makecode.com/" + id;
  const editUrl = id => "https://arcade.makecode.com/#pub:" + id;

  /* ---------- tiny CSV parser (handles quoted fields, commas, newlines) ---------- */
  function parseCSV(text){
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++){
      const c = text[i];
      if (inQuotes){
        if (c === '"'){
          if (text[i+1] === '"'){ field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else if (c === '"'){
        inQuotes = true;
      } else if (c === ","){
        row.push(field); field = "";
      } else if (c === "\n" || c === "\r"){
        if (c === "\r" && text[i+1] === "\n") i++;
        row.push(field); field = "";
        rows.push(row); row = [];
      } else field += c;
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    return rows;
  }

  /* ---------- rows -> games ---------- */
  function findCol(headers, needles, skipIdx){
    for (const n of needles){
      const i = headers.findIndex((h, idx) => idx !== skipIdx && h.includes(n));
      if (i > -1) return i;
    }
    return -1;
  }
  function cleanName(s){ return s.replace(/\s+/g," ").trim(); }
  function rowsToGames(rows){
    if (!rows.length) return [];
    const headers = rows[0].map(h => String(h||"").trim().toLowerCase());
    const gameIdx  = findCol(headers, ["game name","game title","game"]);
    const urlIdx   = findCol(headers, ["makecode","share link","link","url"]);
    const gradeIdx = findCol(headers, ["grade","year level","year"]);
    const nameIdx  = findCol(headers, ["first name","student name","name"], gameIdx);
    const out = [];
    for (let r = 1; r < rows.length; r++){
      const row = rows[r];
      if (!row || !row.length) continue;
      const rawUrl = urlIdx > -1 ? String(row[urlIdx] ?? "").trim() : "";
      const id = extractId(rawUrl);
      if (!id) continue;
      out.push({
        id,
        name:  nameIdx  > -1 ? String(row[nameIdx]  ?? "").trim() : "",
        grade: gradeIdx > -1 ? String(row[gradeIdx] ?? "").trim() : "",
        game:  cleanName(gameIdx > -1 ? String(row[gameIdx] ?? "") : "")
      });
    }
    return out;   // oldest first
  }

  async function fetchGames(){
    const res = await fetch(SHEET_URL, {cache:"no-store"});
    if (!res.ok) throw new Error("HTTP " + res.status);
    return rowsToGames(parseCSV(await res.text()));
  }

  async function refreshGames(isFirstLoad){
    try {
      const next = await fetchGames();
      const changed = JSON.stringify(next) !== JSON.stringify(games);
      games = next;
      loadMsg.textContent = "";
      loadMsg.className = "msg";
      if (changed || isFirstLoad) render();
    } catch(e){
      if (isFirstLoad){
        loadMsg.textContent = "Couldn't load games from the spreadsheet. Check the sheet is published and refresh the page.";
        loadMsg.className = "msg err";
      }
      console.error("SPARK Arcade: failed to load games", e);
    }
  }

  /* ---------- cartridge shell colours (picked per game, stable across reloads) ---------- */
  const SHELLS = ["#4dc3ff","#ffd60a","#ff6b6b","#7bd88f","#c792ea","#ff9e64"];
  function shellFor(id){
    let h = 0;
    for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
    return SHELLS[h % SHELLS.length];
  }

  /* ---------- render ---------- */
  function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  function currentView(){
    let list = games.slice();
    if (sortOrder === "newest") list.reverse();
    if (query){
      const q = query.toLowerCase();
      list = list.filter(g =>
        g.game.toLowerCase().includes(q) ||
        g.name.toLowerCase().includes(q) ||
        g.grade.toLowerCase().includes(q));
    }
    return list;
  }

  function render(){
    const view = currentView();
    countEl.textContent = view.length + (view.length === 1 ? " game" : " games");
    shelf.innerHTML = "";

    if (!view.length){
      const noneAtAll = !games.length;
      emptyTitle.textContent = noneAtAll ? "No games yet" : "No games match your search";
      emptyText.textContent = noneAtAll
        ? "Games added to the spreadsheet appear here automatically."
        : "Try a different name, or clear the search box to see every cartridge.";
      emptyState.style.display = "block";
      return;
    }
    emptyState.style.display = "none";

    const frag = document.createDocumentFragment();
    for (const g of view){
      const gPlayUrl = playUrl(g.id);
      const cart = document.createElement("div");
      cart.className = "cart";
      cart.style.setProperty("--shell", shellFor(g.id));
      cart.innerHTML =
        '<div class="grip"></div>' +
        '<div class="sticker">' +
          '<div class="gname">' + esc(g.game || "Untitled game") + '</div>' +
          '<div class="who">by ' + esc(g.name || "?") + (g.grade ? ' &bull; ' + esc(g.grade) : '') + '</div>' +
        '</div>' +
        '<div class="actions">' +
          '<button class="remix-btn" type="button" title="Open this game in the MakeCode editor and make your own version">&#9889; Remix</button>' +
          '<a class="play-link" href="' + esc(gPlayUrl) + '" target="_blank" rel="noopener" title="Play this game in MakeCode">' + esc(gPlayUrl) + '</a>' +
        '</div>';
      cart.querySelector(".remix-btn").addEventListener("click", ()=>{
        window.open(editUrl(g.id), "_blank", "noopener");
      });
      frag.appendChild(cart);
    }
    shelf.appendChild(frag);
  }

  /* ---------- search + sort ---------- */
  searchBox.addEventListener("input", ()=>{
    query = searchBox.value.trim();
    render();
  });
  sortBtn.addEventListener("click", ()=>{
    sortOrder = sortOrder === "newest" ? "oldest" : "newest";
    sortBtn.textContent = sortOrder === "newest" ? "Sort: Newest" : "Sort: Oldest";
    render();
  });
  document.addEventListener("keydown", (e)=>{
    if (e.key === "/" && document.activeElement !== searchBox){
      e.preventDefault();
      searchBox.focus();
    }
  });

  /* ---------- go ---------- */
  refreshGames(true);
  setInterval(()=>refreshGames(false), REFRESH_MS);
})();
</script>
</body>
</html>
